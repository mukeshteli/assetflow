server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: assetflow-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:assetflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:QAZplm096@}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC

  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-before-deploying}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}